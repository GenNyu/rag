name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
jobs:
  claude:
    runs-on: rag
    steps:
      - uses: actions/checkout@v4      # ← THÊM DÒNG NÀY
        with:
          fetch-depth: 0               # lấy full lịch sử để tạo branch được
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
